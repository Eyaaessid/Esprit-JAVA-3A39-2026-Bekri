server.port=8081

# ============================================================
# DATABASE — Connexion à la DB MySQL partagée avec Symfony
# DB : bekri_db | MySQL 8.0.45 | charset utf8mb4
# ============================================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bekri_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ddl-auto=validate : NE JAMAIS modifier le schéma existant
# Hibernate lit la DB telle quelle — aucun CREATE/ALTER/DROP
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.bekri=DEBUG
