server.port=8081

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bekri_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectTimeout=60000&socketTimeout=60000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Aligne les booléens JPA avec tinyint(1) MySQL/MariaDB (Symfony) pour ddl-auto=validate
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=TINYINT

logging.level.org.hibernate.SQL=DEBUG
logging.level.com.bekri=DEBUG
# Diagnostic sécurité (désactiver si trop verbeux)
logging.level.org.springframework.security=DEBUG

app.jwt.secret=9fK2mA7pQ1xR8sV3nZ6yL0tU5wE2cD9hJ4kB7mN1qP8rS3vX6zA0bC5dE2fG8hJ
app.jwt.expirationSeconds=86400

# Avatars (multipart upload → fichiers servis sous /uploads/avatars/**)
app.files.avatar-dir=./data/avatars
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
